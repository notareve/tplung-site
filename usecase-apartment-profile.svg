    <path d="M18 128 V88 M38 128 V52 M58 128 V96 M78 128 V36" stroke="#4bd08f" stroke-width="7" stroke-linecap="round"/>
    <path d="M15 136 H79" stroke="#d8f6f8" stroke-width="3" opacity="0.6"/>
